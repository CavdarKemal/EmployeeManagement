# Verwendung:
#   docker compose -f docker-compose.test.yml up --abort-on-container-exit

version: "3.9"

services:

  postgres-test:
    image: postgres:16-alpine
    container_name: employeemanagement-postgres-test
    environment:
      POSTGRES_DB:       employeemanagement_test
      POSTGRES_USER:     test
      POSTGRES_PASSWORD: test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d employeemanagement_test"]
      interval: 5s
      retries: 10
    networks:
      - test-net

  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: test
    container_name: employeemanagement-backend-test
    depends_on:
      postgres-test:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres-test:5432/employeemanagement_test
      SPRING_DATASOURCE_USERNAME: test
      SPRING_DATASOURCE_PASSWORD: test
      SPRING_FLYWAY_ENABLED:      "true"
    command: mvn test -Dspring.profiles.active=test
    volumes:
      - ~/.m2:/root/.m2:cached
    networks:
      - test-net

networks:
  test-net:
    driver: bridge
