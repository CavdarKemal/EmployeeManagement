# .github/dependabot.yml
# Dokumentation: https://docs.github.com/en/code-security/dependabot

version: 2

updates:

  # ── Maven (Spring Boot Backend) ──────────────────────────
  - package-ecosystem: maven
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 10
    reviewers:
      - your-github-username
    assignees:
      - your-github-username
    labels:
      - dependencies
      - backend
      - java
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: scope
    groups:
      # Spring Boot alle zusammen updaten
      spring-boot:
        patterns:
          - "org.springframework.boot:*"
          - "org.springframework:*"
          - "org.springframework.security:*"
      # Testcontainers zusammen
      testcontainers:
        patterns:
          - "org.testcontainers:*"
      # JWT-Bibliotheken zusammen
      jwt:
        patterns:
          - "io.jsonwebtoken:*"
    ignore:
      # Major-Updates manuell prüfen
      - dependency-name: "org.springframework.boot:*"
        update-types: ["version-update:semver-major"]

  # ── npm (React Frontend) ──────────────────────────────────
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 10
    reviewers:
      - your-github-username
    labels:
      - dependencies
      - frontend
      - javascript
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: scope
    groups:
      # React-Ökosystem zusammen
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-router*"
          - "@types/react*"
      # Vite + Build-Tools zusammen
      build-tools:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "eslint*"
          - "@eslint/*"
      # Testing zusammen
      testing:
        patterns:
          - "vitest"
          - "@testing-library/*"
          - "jsdom"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ── Docker (Basis-Images) ─────────────────────────────────
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: tuesday
      time: "07:00"
      timezone: Europe/Berlin
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(docker)"

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
      day: tuesday
      time: "07:00"
      timezone: Europe/Berlin
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(docker)"

  # ── GitHub Actions ────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: wednesday
      time: "07:00"
      timezone: Europe/Berlin
    labels:
      - dependencies
      - ci-cd
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions:
        patterns:
          - "*"
