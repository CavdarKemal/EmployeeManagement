name: EmployeeManagement CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository }}/employeemanagement-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository }}/employeemanagement-frontend
  JAVA_VERSION: "21"
  NODE_VERSION: "20"

# ═══════════════════════════════════════════════════════════
jobs:

  # ── 1. Backend: Tests ─────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: employeemanagement_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d employeemanagement_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java ${{ env.JAVA_VERSION }} einrichten
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Unit-Tests ausführen
        working-directory: backend
        run: mvn test -Dspring.profiles.active=test -B

      - name: Integrationstests ausführen
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/employeemanagement_test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
        run: mvn verify -Dspring.profiles.active=test -B

      - name: Testergebnisse veröffentlichen
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Backend Tests
          path: backend/target/surefire-reports/*.xml
          reporter: java-junit

      - name: Test-Coverage hochladen
        uses: codecov/codecov-action@v4
        with:
          files: backend/target/site/jacoco/jacoco.xml
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── 2. Frontend: Tests & Lint ─────────────────────────────
  frontend-test:
    name: Frontend Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js ${{ env.NODE_VERSION }} einrichten
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Abhängigkeiten installieren
        working-directory: frontend
        run: npm ci

      - name: Unit-Tests (Vitest)
        working-directory: frontend
        run: npm run test -- --coverage

      - name: Build-Test
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8080/api/v1

      - name: Coverage hochladen
        uses: codecov/codecov-action@v4
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── 3. Security Scan ──────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java einrichten
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: OWASP Dependency-Check (Backend)
        working-directory: backend
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=8 \
            -DsuppressionFile=owasp-suppressions.xml \
            -B
        continue-on-error: true

      - name: Trivy Filesystem-Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Bericht hochladen
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            backend/target/dependency-check-report.html
          retention-days: 30

  # ── 4. Docker Build & Push ────────────────────────────────
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, security-scan]
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      backend-tag:  ${{ steps.meta-backend.outputs.tags }}
      frontend-tag: ${{ steps.meta-frontend.outputs.tags }}
      version:      ${{ steps.version.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Version bestimmen
        id: version
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "value=$(git describe --tags --always 2>/dev/null || echo v1.0.${{ github.run_number }})" >> $GITHUB_OUTPUT
          else
            echo "value=dev-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: GHCR Login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Backend – Image-Metadaten
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=${{ steps.version.outputs.value }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Backend – Maven bauen
        working-directory: backend
        run: mvn package -DskipTests -B

      - name: Backend – Docker Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Frontend – Image-Metadaten
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=${{ steps.version.outputs.value }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Frontend – Docker Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Image Vulnerability Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_BACKEND }}:latest
          severity: CRITICAL
          exit-code: "0"       # warnen, nicht blockieren
          format: sarif
          output: trivy-results.sarif

      - name: Trivy-Ergebnisse zu GitHub Security hochladen
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── 5. Deploy – Staging ───────────────────────────────────
  deploy-staging:
    name: Deploy -> Staging
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.employeemanagement.example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SSH Deploy zu Staging-Server
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key:      ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/employeemanagement-staging

            # Neue Images ziehen
            docker compose pull

            # Zero-Downtime Deploy
            docker compose up -d --no-deps --build backend
            sleep 10
            docker compose up -d --no-deps --build frontend

            # Alte Images aufräumen
            docker image prune -f

            echo "Staging Deploy abgeschlossen: ${{ needs.docker-build.outputs.version }}"

      - name: Smoke-Test Staging
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://staging.employeemanagement.example.com/api/v1/actuator/health)
          if [ "$STATUS" != "200" ]; then
            echo "Smoke-Test fehlgeschlagen! HTTP $STATUS"
            exit 1
          fi
          echo "Staging laeuft. HTTP $STATUS"

  # ── 6. Deploy – Produktion ────────────────────────────────
  deploy-production:
    name: Deploy -> Produktion
    runs-on: ubuntu-latest
    needs: [docker-build, deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://employeemanagement.example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SSH Deploy zu Produktions-Server
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key:      ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /opt/employeemanagement

            # Backup der aktuellen DB
            docker exec employeemanagement-postgres pg_dump -U employeemanagement employeemanagement \
              > /opt/backups/employeemanagement_$(date +%Y%m%d_%H%M%S).sql
            echo "Datenbank-Backup erstellt"

            # Rolling Update
            docker compose pull backend frontend

            docker compose up -d --no-deps backend
            echo "Backend-Healthcheck ..."
            sleep 20

            HEALTH=$(curl -s http://localhost:8080/actuator/health | grep -o '"status":"UP"' || echo "")
            if [ -z "$HEALTH" ]; then
              echo "Backend nicht gesund - Rollback"
              docker compose rollout revert backend
              exit 1
            fi

            docker compose up -d --no-deps frontend
            echo "Produktion Deploy abgeschlossen: ${{ needs.docker-build.outputs.version }}"

      - name: Produktion Smoke-Test
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://employeemanagement.example.com/api/v1/actuator/health)
          echo "HTTP Status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Deployment-Benachrichtigung (Slack)
        uses: slackapi/slack-github-action@v1
        if: always()
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && 'OK' || 'FEHLER' }} EmployeeManagement Produktion Deploy *${{ needs.docker-build.outputs.version }}*\n${{ job.status == 'success' && 'Erfolgreich deployed' || 'Deploy FEHLGESCHLAGEN' }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
