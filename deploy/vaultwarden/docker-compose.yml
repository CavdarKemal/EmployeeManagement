# Vaultwarden — Self-hosted Bitwarden-kompatibler Passwort-Manager
#
# Produktion:    docker compose up -d
# Lokaler Test:  docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
#
# Vor dem ersten Start:
#   cp .env.example .env  und Werte einsetzen
#   ADMIN_TOKEN als Argon2id-Hash erzeugen:
#     docker run --rm -it vaultwarden/server /vaultwarden hash

services:
  vaultwarden:
    image: vaultwarden/server:1.36.0-alpine
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      DOMAIN:              ${DOMAIN:?DOMAIN muss in .env gesetzt sein}
      SIGNUPS_ALLOWED:     "false"
      INVITATIONS_ALLOWED: "true"
      WEBSOCKET_ENABLED:   "true"
      ADMIN_TOKEN:         ${ADMIN_TOKEN:?ADMIN_TOKEN muss in .env gesetzt sein}
      SMTP_HOST:           ${SMTP_HOST:-smtp.gmail.com}
      SMTP_FROM:           ${SMTP_FROM:?SMTP_FROM muss in .env gesetzt sein}
      SMTP_FROM_NAME:      ${SMTP_FROM_NAME:-EmployeeManagement Vault}
      SMTP_PORT:           ${SMTP_PORT:-587}
      SMTP_SECURITY:       ${SMTP_SECURITY:-starttls}
      SMTP_USERNAME:       ${SMTP_USERNAME:?SMTP_USERNAME muss in .env gesetzt sein}
      SMTP_PASSWORD:       ${SMTP_PASSWORD:?SMTP_PASSWORD muss in .env gesetzt sein}
    volumes:
      - ./data:/data
    ports:
      - "127.0.0.1:8222:80"
    healthcheck:
      test: ["CMD", "/usr/bin/wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/alive"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
