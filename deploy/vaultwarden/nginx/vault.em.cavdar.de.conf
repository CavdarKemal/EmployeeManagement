# Nginx-Site für Vaultwarden auf der VPS.
#
# Installation:
#   sudo cp vault.em.cavdar.de.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/vault.em.cavdar.de.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d vault.em.cavdar.de
#
# Certbot fügt nach erfolgreichem Run automatisch den server-Block für 443
# inklusive Redirect 80 -> 443 hinzu.

server {
    listen 80;
    listen [::]:80;
    server_name vault.em.cavdar.de;

    # Attachments können größer als 1 MB werden (Default).
    client_max_body_size 525M;

    # WebSocket-Hub für Live-Sync zwischen Geräten.
    location /notifications/hub {
        proxy_pass         http://127.0.0.1:8222;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SignalR-Negotiate-Endpoint (nicht WebSocket, aber gleicher Pfad-Prefix).
    location /notifications/hub/negotiate {
        proxy_pass         http://127.0.0.1:8222;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass         http://127.0.0.1:8222;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }
}
