spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/employeemanagement
    username: employeemanagement
    password: caems_secret
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

management:
  health:
    mail:
      enabled: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

app:
  jwt:
    secret: ${JWT_SECRET:#{T(java.util.UUID).randomUUID().toString() + T(java.util.UUID).randomUUID().toString()}}
    expiration-ms: 86400000   # 24 Stunden
  upload:
    dir: ${UPLOAD_DIR:./uploads/photos}
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173
  notification:
    enabled: ${NOTIFICATION_ENABLED:false}
    recipient: ${NOTIFICATION_EMAIL:admin@firma.de}
    warranty-days: 30
    renewal-days: 30
    return-days: 7
  deploy-notify:
    secret: ${APP_DEPLOY_NOTIFY_SECRET:}

logging:
  level:
    com.employeemanagement: DEBUG
    org.springframework.security: INFO
