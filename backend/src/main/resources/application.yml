spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/employeemanagement
    username: employeemanagement
    password: caems_secret
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

app:
  jwt:
    secret: ${JWT_SECRET:MindestenS32ZeichenLangerGeheimSchluessel!}
    expiration-ms: 86400000   # 24 Stunden
  upload:
    dir: ${UPLOAD_DIR:./uploads/photos}
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173

logging:
  level:
    com.employeemanagement: DEBUG
    org.springframework.security: INFO
