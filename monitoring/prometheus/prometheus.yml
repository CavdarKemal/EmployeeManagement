global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: employeemanagement-prod
    env:     production

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:

  # ── Spring Boot Backend ──────────────────────────────────
  - job_name: employeemanagement-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [backend:8080]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: employeemanagement-backend

  # ── PostgreSQL ───────────────────────────────────────────
  - job_name: postgres
    static_configs:
      - targets: [postgres-exporter:9187]

  # ── Server (Node Exporter) ───────────────────────────────
  - job_name: node
    static_configs:
      - targets: [node-exporter:9100]

  # ── Prometheus selbst ────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]
